name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks needs full history

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync deps
        run: uv sync --frozen

      - name: Pre-commit (lint, format, mypy, gitleaks)
        run: uv run pre-commit run --all-files --show-diff-on-failure

      - name: Pytest
        run: uv run pytest
